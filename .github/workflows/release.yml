name: Build and release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-preflight:
    name: Validate release credentials
    runs-on: ubuntu-latest
    env:
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - name: Require signing and notarization credentials
        shell: bash
        run: |
          missing=0
          for name in MACOS_CERTIFICATE MACOS_CERTIFICATE_PASSWORD APPLE_API_KEY_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required repository secret: $name"
              missing=1
            fi
          done
          exit "$missing"

  build:
    name: Build ${{ matrix.name }}
    needs: release-preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: dist:mac
            asset: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
              dist/latest-mac.yml
            artifact: mongo-pilot-macos
          - name: Windows
            os: windows-latest
            command: dist:windows
            asset: |
              dist/*.exe
              dist/*.blockmap
              dist/latest.yml
            artifact: mongo-pilot-windows
          - name: Linux
            os: ubuntu-latest
            command: dist:linux
            asset: |
              dist/*.AppImage
              dist/*.blockmap
              dist/latest-linux.yml
            artifact: mongo-pilot-linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Prepare Apple notarization key
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
        run: |
          node -e "require('node:fs').writeFileSync(process.env.APPLE_API_KEY, Buffer.from(process.env.APPLE_API_KEY_BASE64, 'base64'), { mode: 0o600 })"

      - name: Package application
        run: npm run ${{ matrix.command }}
        env:
          CSC_LINK: ${{ runner.os == 'macOS' && secrets.MACOS_CERTIFICATE || '' }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.MACOS_CERTIFICATE_PASSWORD || '' }}
          APPLE_API_KEY: ${{ runner.os == 'macOS' && format('{0}/AuthKey_{1}.p8', runner.temp, secrets.APPLE_API_KEY_ID) || '' }}
          APPLE_API_KEY_ID: ${{ runner.os == 'macOS' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ runner.os == 'macOS' && secrets.APPLE_API_ISSUER || '' }}

      - name: Verify signed and notarized macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          codesign --verify --deep --strict --verbose=2 "dist/mac/Mongo Pilot.app"
          xcrun stapler validate "dist/mac/Mongo Pilot.app"
          spctl --assess --type execute --verbose=4 "dist/mac/Mongo Pilot.app"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: mongo-pilot-*
          path: release-assets
          merge-multiple: true

      - name: Create checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHORT_SHA=${GITHUB_SHA::7}
          TAG="$GITHUB_REF_NAME"
          TITLE="Mongo Pilot v${VERSION} (${SHORT_SHA})"
          NOTES_FILE="release-notes.md"
          awk -v heading="## [$VERSION]" '$0 == heading || index($0, heading " - ") == 1 {capture=1; next} /^## \[/{capture=0} capture' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "::error::CHANGELOG.md has no section for $VERSION"
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE"
          fi
