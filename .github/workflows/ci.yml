name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run smoke tests
        run: |
          npm run test:bson
          npm run test:aggregation
          npm run test:mcp
          npm run test:schema
          npm run test:shell
          npm run test:visualization
          npm run test:visualization-storage

      - name: Audit production dependencies
        run: npm audit --omit=dev
